<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre Assessment | Music Therapy System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">Music Therapy System</div>
        <nav class="menu">
            <a href="/dashboard">Dashboard</a>
            <a href="/participants">Participants</a>
            <a href="/music-library">Music Library</a>
            <a class="active" href="/pre-assessment">Pre Assessment</a>
            <a href="/progress-report">Reports</a>
        </nav>
    </aside>
    <main class="content">
        <div class="topbar">
            <h1>Pre-Session Assessment</h1>
            <button id="logoutBtn" class="btn secondary">Logout</button>
        </div>
        <div id="preMessage" class="msg"></div>
        <section class="panel">
            <form id="preAssessmentForm">
                <label>Session ID</label><input id="session_id" type="number" required>
                <label>Mood Level (1-10)</label><input id="mood_level" type="number" min="1" max="10" required>
                <label>Stress Level (1-10)</label><input id="stress_level" type="number" min="1" max="10" required>
                <label>Attention Level (1-10)</label><input id="attention_level" type="number" min="1" max="10" required>
                <label>Notes</label><textarea id="notes"></textarea>
                <button type="submit">Save Assessment</button>
            </form>
        </section>
    </main>
</div>
<script type="module">
import { bindLogout, requireAuth } from "/static/js/auth.js";
import { initPreAssessmentPage } from "/static/js/sessions.js";
requireAuth();
bindLogout();
initPreAssessmentPage();
</script>
</body>
</html>
