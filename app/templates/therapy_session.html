<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Therapy Session | Music Therapy System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">Music Therapy System</div>
        <nav class="menu">
            <a href="/dashboard">Dashboard</a>
            <a href="/participants">Participants</a>
            <a href="/music-library">Music Library</a>
            <a class="active" href="/therapy-session">Start Session</a>
            <a href="/progress-report">Reports</a>
        </nav>
    </aside>
    <main class="content">
        <div class="topbar">
            <h1>Start Therapy Session</h1>
            <button id="logoutBtn" class="btn secondary">Logout</button>
        </div>
        <div id="sessionMessage" class="msg"></div>
        <section class="panel">
            <form id="sessionForm">
                <label>Participant</label>
                <select id="participant_id"></select>
                <label>Therapist ID</label>
                <input id="therapist_id" type="number" value="1" required>
                <label>Music Track</label>
                <select id="music_id"></select>
                <label>Session Date</label>
                <input id="session_date" type="date" required>
                <label>Duration (min)</label>
                <input id="duration_min" type="number" required>
                <label>Notes</label>
                <textarea id="session_notes"></textarea>
                <button type="submit">Start Session</button>
            </form>
        </section>
        <section class="panel">
            <div class="actions">
                <a class="btn" href="/pre-assessment">Pre Assessment</a>
                <a class="btn success" href="/post-feedback">Post Feedback</a>
            </div>
        </section>
    </main>
</div>
<script type="module">
import { bindLogout, requireAuth } from "/static/js/auth.js";
import { initSessionPage } from "/static/js/sessions.js";
requireAuth();
bindLogout();
initSessionPage();
</script>
</body>
</html>
