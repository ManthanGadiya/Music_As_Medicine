<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress Report</title>
    <link rel="stylesheet" href="../static/css/styles.css" />
</head>
<body>
<div class="container">
    <h1>Progress Report</h1>
    <div class="nav"><a href="./dashboard.html">Dashboard</a></div>
    <div class="panel">
        <form id="progressForm">
            <input id="participant_id" type="number" placeholder="Participant ID" required />
            <button type="submit">Get Progress</button>
        </form>
    </div>
    <div class="panel"><pre id="result"></pre></div>
</div>
<script src="../static/js/app.js"></script>
<script>
document.getElementById("progressForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
        const data = await apiRequest(`/participants/${getIntValue("participant_id")}/progress`);
        showJson("result", data);
    } catch (err) {
        showJson("result", { error: err.message });
    }
});
</script>
</body>
</html>
