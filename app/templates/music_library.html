<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Library</title>
    <link rel="stylesheet" href="../static/css/styles.css" />
</head>
<body>
<div class="container">
    <h1>Music Library</h1>
    <div class="nav"><a href="./dashboard.html">Dashboard</a></div>
    <div class="panel">
        <h2>Add Music</h2>
        <form id="musicForm">
            <input id="title" placeholder="Title" required />
            <input id="genre" placeholder="Genre" required />
            <input id="instrument" placeholder="Instrument" required />
            <input id="tempo" type="number" step="0.1" placeholder="Tempo" required />
            <input id="frequency_range" placeholder="Frequency range" required />
            <input id="duration_sec" type="number" placeholder="Duration (sec)" required />
            <input id="file_path" placeholder="/music/example.mp3" required />
            <button type="submit">Add Track</button>
        </form>
        <button id="getMusic">Get Music Library</button>
    </div>
    <div class="panel"><pre id="result"></pre></div>
</div>
<script src="../static/js/app.js"></script>
<script>
document.getElementById("musicForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    try {
        const data = await apiRequest("/music", "POST", {
            title: document.getElementById("title").value,
            genre: document.getElementById("genre").value,
            instrument: document.getElementById("instrument").value,
            tempo: Number(document.getElementById("tempo").value),
            frequency_range: document.getElementById("frequency_range").value,
            duration_sec: getIntValue("duration_sec"),
            file_path: document.getElementById("file_path").value
        });
        showJson("result", data);
    } catch (err) {
        showJson("result", { error: err.message });
    }
});

document.getElementById("getMusic").addEventListener("click", async () => {
    try {
        const data = await apiRequest("/music");
        showJson("result", data);
    } catch (err) {
        showJson("result", { error: err.message });
    }
});
</script>
</body>
</html>
