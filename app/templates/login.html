<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Music Therapy System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<canvas id="particles" class="particles"></canvas>
<div class="loading-overlay"><div class="pulse-logo"></div></div>
<main class="auth-shell">
    <section class="auth-card reveal">
        <h1>Therapist Login</h1>
        <p class="hero-sub">Secure access to AI-powered therapy dashboard.</p>
        <form id="loginForm">
            <label for="email">Email</label><input id="email" type="email" placeholder="therapist@mail.com" required>
            <label for="password">Password</label><input id="password" type="password" required>
            <button class="cta-breathe" type="submit">Login</button>
        </form>
        <div id="formMessage" class="msg"></div>
        <p>New user? <a href="/signup">Create account</a></p>
    </section>
</main>
<script type="module">
import { bindLoginForm, redirectIfAuthenticated } from "/static/js/auth.js";
import { initUI } from "/static/js/ui.js";
redirectIfAuthenticated();
bindLoginForm();
initUI();
</script>
</body>
</html>
