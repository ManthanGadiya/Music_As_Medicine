<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Music Therapy System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<main class="auth-shell">
    <section class="auth-card">
        <h1>Therapist Login</h1>
        <p>Access your therapy dashboard.</p>
        <form id="loginForm">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="therapist@mail.com" required>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>
        <div id="formMessage" class="msg"></div>
        <p>New user? <a href="/signup">Create account</a></p>
    </section>
</main>
<script type="module">
import { bindLoginForm, redirectIfAuthenticated } from "/static/js/auth.js";
redirectIfAuthenticated();
bindLoginForm();
</script>
</body>
</html>
