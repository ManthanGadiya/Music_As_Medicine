<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Feedback | Music Therapy System</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<canvas id="particles" class="particles"></canvas><div class="loading-overlay"><div class="pulse-logo"></div></div>
<div class="app-shell">
  <aside class="sidebar"><div class="brand">Music Therapy System</div><nav class="menu"><a href="/dashboard">Dashboard</a><a href="/participants">Participants</a><a href="/music-library">Music Library</a><a class="active" href="/post-feedback">Post Feedback</a><a href="/progress-report">Health Analytics</a><a href="/hospital-network">Hospital Network</a></nav></aside>
  <main class="content">
    <div class="topbar"><h1>Post-Session Feedback</h1><div class="actions"><button id="themeToggle" class="btn secondary" type="button">Light Mode</button><button id="logoutBtn" class="btn outline" type="button">Logout</button></div></div>
    <div id="postMessage" class="msg"></div>
    <section class="panel reveal"><form id="postFeedbackForm"><label>Session ID</label><input id="session_id" type="number" required><label>Mood Level (1-10)</label><input id="mood_level" type="number" min="1" max="10" required><label>Behavior Change</label><input id="behavior_change"><label>Attention Change</label><input id="attention_change"><label>Social Response</label><input id="social_response"><label>Comments</label><textarea id="comments"></textarea><button class="cta-breathe" type="submit">Save & View Report</button></form></section>
  </main>
</div>
<a class="btn fab" href="/therapy-session">Start Therapy</a>
<script type="module">import { bindLogout, requireAuth } from "/static/js/auth.js"; import { initPostFeedbackPage } from "/static/js/sessions.js"; import { initUI } from "/static/js/ui.js"; requireAuth(); bindLogout(); initPostFeedbackPage(); initUI();</script>
</body>
</html>
