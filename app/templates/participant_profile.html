<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participant Profile</title>
    <link rel="stylesheet" href="../static/css/styles.css" />
</head>
<body>
<div class="container">
    <h1>Participant Profile</h1>
    <div class="nav">
        <a href="./participants.html">Participants</a>
        <a href="./progress_report.html">Progress</a>
    </div>
    <div class="panel">
        <form id="profileForm">
            <input id="participant_id" type="number" placeholder="Participant ID" required />
            <button type="submit">Get Profile</button>
        </form>
    </div>
    <div class="panel"><pre id="result"></pre></div>
</div>
<script src="../static/js/app.js"></script>
<script>
document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = getIntValue("participant_id");
    try {
        const profile = await apiRequest(`/participants/${id}`);
        const sessions = await apiRequest(`/participants/${id}/sessions`);
        showJson("result", { profile, sessions });
    } catch (err) {
        showJson("result", { error: err.message });
    }
});
</script>
</body>
</html>
